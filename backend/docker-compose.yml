services:
  api_gateway:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      SMARTFLOW_EVENT_BUS: redis
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mongo
    volumes:
      - .:/app/backend
    command: uvicorn backend.api_gateway.main:socket_app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      SMARTFLOW_EVENT_BUS: redis
    depends_on:
      - redis
      - postgres
      - mongo
    command: celery -A backend.utils.celery_app.celery_app worker --loglevel=INFO

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartflow
      POSTGRES_PASSWORD: smartflow
      POSTGRES_DB: smartflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
