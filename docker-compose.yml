services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      SMARTFLOW_EVENT_BUS: redis
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mongo
    command: uvicorn backend.api_gateway.main:socket_app --host 0.0.0.0 --port 8000

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_PATH: /socket.io
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartflow
      POSTGRES_PASSWORD: smartflow
      POSTGRES_DB: smartflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
